<div class="root">
<h2 class="sr-only">Core mechanics tutorial for Freedom's Wrath in Unity — 4 phases from beginner to professional covering player movement, combat, enemy AI, and advanced systems</h2>

<div class="phase-nav">
  <button class="ph-btn active" onclick="showPhase(0,this)">Phase 1 — Beginner</button>
  <button class="ph-btn" onclick="showPhase(1,this)">Phase 2 — Intermediate</button>
  <button class="ph-btn" onclick="showPhase(2,this)">Phase 3 — Advanced</button>
  <button class="ph-btn" onclick="showPhase(3,this)">Phase 4 — Professional</button>
</div>

<div id="phase-container"></div>
</div>

<script>
const PHASES = [
  {
    label:"Phase 1 — Beginner",
    intro:"Start here. Build a grey-box character that moves, jumps, and collides with platforms. No art, no combat. The goal is a satisfying movement feel — this is the most important phase because if movement doesn't feel good, nothing else matters.",
    color:"#534AB7",textColor:"#EEEDFE",numBg:"#EEEDFE",numColor:"#3C3489",
    mechs:[
      {
        name:"1.1 — Project setup and the Rigidbody2D decision",
        tags:[{t:"Setup",c:"#EEEDFE/#3C3489"},{t:"Physics",c:"#E1F5EE/#085041"}],
        sections:[
          {title:"What to do first",body:"Create a new Unity 2022 LTS project (2D Core template). Install: Cinemachine, Input System (new), TextMeshPro. In Project Settings → Physics 2D, set Gravity to -30 (not the default -9.8). Real-world gravity feels floaty in a 2D platformer — -25 to -35 is the standard range."},
          {title:"The Rigidbody2D configuration",body:"Add Rigidbody2D to your player GameObject. Set Collision Detection to Continuous (not Discrete — prevents passing through thin platforms at speed). Set Interpolate to Interpolate — smooths movement between physics steps."},
        ],
        code:`<span class="comment">// PlayerController.cs — the foundation script</span>
<span class="comment">// Attach this to your Amari GameObject</span>

<span class="kw">using</span> UnityEngine;
<span class="kw">using</span> UnityEngine.InputSystem;

<span class="kw">public class</span> <span class="type">PlayerController</span> : MonoBehaviour
{
    <span class="comment">// Inspector-tunable values — your designer can see these</span>
    [Header(<span class="str">"Movement"</span>)]
    [SerializeField] <span class="kw">float</span> moveSpeed = <span class="val">8f</span>;
    [SerializeField] <span class="kw">float</span> jumpForce = <span class="val">16f</span>;

    <span class="type">Rigidbody2D</span> rb;
    <span class="type">Vector2</span> moveInput;
    <span class="kw">bool</span> isGrounded;

    <span class="kw">void</span> Awake()
    {
        rb = GetComponent<<span class="type">Rigidbody2D</span>>();
    }

    <span class="comment">// Called by Unity's Input System (new)</span>
    <span class="kw">public void</span> OnMove(<span class="type">InputValue</span> value)
    {
        moveInput = value.Get<<span class="type">Vector2</span>>();
    }

    <span class="kw">public void</span> OnJump(<span class="type">InputValue</span> value)
    {
        <span class="kw">if</span> (value.isPressed && isGrounded)
            rb.velocity = <span class="kw">new</span> <span class="type">Vector2</span>(rb.velocity.x, jumpForce);
    }

    <span class="kw">void</span> FixedUpdate()
    {
        <span class="comment">// Only control horizontal — let physics handle vertical</span>
        rb.velocity = <span class="kw">new</span> <span class="type">Vector2</span>(moveInput.x * moveSpeed, rb.velocity.y);
    }
}`,
        insight:{label:"Design insight",text:"Expose every number in the Inspector with [SerializeField]. This lets you — and eventually Dev 2 — tune movement feel without touching code. The Celeste team spent weeks adjusting gravity, jump force, and move speed values. Having them in the Inspector makes that iteration instant."}
      },
      {
        name:"1.2 — Ground detection (the right way)",
        tags:[{t:"Physics",c:"#E1F5EE/#085041"},{t:"Collision",c:"#FAEEDA/#633806"}],
        sections:[
          {title:"Why not OnCollisionEnter2D?",body:"Beginners use OnCollisionEnter2D to detect the ground. This breaks on slopes, ledge edges, and multi-tile platforms. The professional approach is a GroundCheck — a small Physics2D.OverlapCircle cast downward from the player's feet."},
        ],
        code:`<span class="comment">// Add to PlayerController.cs</span>

[Header(<span class="str">"Ground Check"</span>)]
[SerializeField] <span class="type">Transform</span> groundCheck;        <span class="comment">// empty child object at feet</span>
[SerializeField] <span class="kw">float</span> groundCheckRadius = <span class="val">0.15f</span>;
[SerializeField] <span class="type">LayerMask</span> groundLayer;       <span class="comment">// assign "Ground" layer in Inspector</span>

<span class="kw">void</span> Update()
{
    <span class="comment">// Overlap circle at feet — true if touching any Ground layer collider</span>
    isGrounded = Physics2D.<span class="type">OverlapCircle</span>(
        groundCheck.position,
        groundCheckRadius,
        groundLayer
    );
}

<span class="comment">// In Unity Editor:</span>
<span class="comment">// 1. Create empty child GameObject on Amari, name it "GroundCheck"</span>
<span class="comment">// 2. Position it just below feet (y offset of about -0.5)</span>
<span class="comment">// 3. Create a Layer called "Ground", assign all platform tilemaps to it</span>
<span class="comment">// 4. Drag the "Ground" layer into groundLayer in the Inspector</span>`,
        warn:{label:"Common beginner mistake",text:"Setting the GroundCheck radius too large causes the player to 'stick' to walls — the circle overlaps wall colliders as well as floor colliders. Keep the radius small (0.1–0.2) and position the GroundCheck precisely at the sole of the foot, not at the centre of the character."}
      },
      {
        name:"1.3 — Coyote time and jump buffering",
        tags:[{t:"Game feel",c:"#EEEDFE/#3C3489"},{t:"Polish",c:"#FAECE7/#993C1D"}],
        sections:[
          {title:"What are these?",body:"Coyote time: the player can jump for ~0.1s after walking off a ledge. Without it, jumps feel unresponsive at ledge edges — the player steps off and can't jump. Jump buffer: if the player presses jump ~0.1s before landing, the jump registers. Without it, pressing jump a fraction early feels like a missed input. Both are invisible mechanics that make movement feel 'tight'."},
        ],
        code:`<span class="comment">// Add to PlayerController.cs</span>

[Header(<span class="str">"Jump Feel"</span>)]
[SerializeField] <span class="kw">float</span> coyoteTime = <span class="val">0.15f</span>;
[SerializeField] <span class="kw">float</span> jumpBufferTime = <span class="val">0.1f</span>;

<span class="kw">float</span> coyoteTimeCounter;
<span class="kw">float</span> jumpBufferCounter;

<span class="kw">void</span> Update()
{
    isGrounded = Physics2D.<span class="type">OverlapCircle</span>(groundCheck.position, groundCheckRadius, groundLayer);

    <span class="comment">// Coyote time — count down when airborne</span>
    <span class="kw">if</span> (isGrounded) coyoteTimeCounter = coyoteTime;
    <span class="kw">else</span> coyoteTimeCounter -= Time.deltaTime;

    <span class="comment">// Jump buffer — count down after jump pressed</span>
    <span class="kw">if</span> (jumpBufferCounter > <span class="val">0f</span>) jumpBufferCounter -= Time.deltaTime;

    <span class="comment">// Attempt jump when buffer active and coyote time valid</span>
    <span class="kw">if</span> (jumpBufferCounter > <span class="val">0f</span> && coyoteTimeCounter > <span class="val">0f</span>)
    {
        rb.velocity = <span class="kw">new</span> <span class="type">Vector2</span>(rb.velocity.x, jumpForce);
        jumpBufferCounter = <span class="val">0f</span>;
    }

    <span class="comment">// Variable jump height — release early = lower jump</span>
    <span class="kw">if</span> (!jumpHeld && rb.velocity.y > <span class="val">0f</span>)
        rb.velocity += <span class="type">Vector2</span>.up * Physics2D.gravity.y * <span class="val">2f</span> * Time.deltaTime;
}

<span class="kw">bool</span> jumpHeld;
<span class="kw">public void</span> OnJump(<span class="type">InputValue</span> value)
{
    jumpHeld = value.isPressed;
    <span class="kw">if</span> (value.isPressed) jumpBufferCounter = jumpBufferTime;
}`,
        insight:{label:"Why Celeste feels amazing",text:"Celeste implements both of these plus 12 other 'invisible' feel improvements — early jump descent, apex floatiness, directional air control. The player never notices them. They only notice if they're missing. Every professional 2D platformer has these. Implement them before showing anyone the game."}
      }
    ]
  },
  {
    label:"Phase 2 — Intermediate",
    intro:"Your player moves well. Now add combat, a dash ability, camera, and the first enemy. Each system should be its own script — never one giant PlayerController that does everything.",
    color:"#0F6E56",textColor:"#E1F5EE",numBg:"#E1F5EE",numColor:"#085041",
    mechs:[
      {
        name:"2.1 — The dash mechanic",
        tags:[{t:"Ability",c:"#EEEDFE/#3C3489"},{t:"Cooldown",c:"#E1F5EE/#085041"}],
        sections:[
          {title:"How dashes work in professional games",body:"A dash is a burst of velocity in the movement direction with a brief invincibility window. Three things make it feel good: (1) a brief freeze frame at the start (0.05s), (2) a trail VFX showing the path, (3) a clear cooldown indicator so the player knows when it's ready. Separate DashController.cs from PlayerController.cs — this keeps each system testable independently."},
        ],
        code:`<span class="comment">// DashController.cs — attach alongside PlayerController</span>

<span class="kw">public class</span> <span class="type">DashController</span> : MonoBehaviour
{
    [SerializeField] <span class="kw">float</span> dashSpeed = <span class="val">20f</span>;
    [SerializeField] <span class="kw">float</span> dashDuration = <span class="val">0.15f</span>;
    [SerializeField] <span class="kw">float</span> dashCooldown = <span class="val">0.8f</span>;
    [SerializeField] <span class="type">TrailRenderer</span> dashTrail;

    <span class="type">Rigidbody2D</span> rb;
    <span class="type">PlayerController</span> player;
    <span class="kw">bool</span> isDashing, canDash = <span class="kw">true</span>;
    <span class="kw">float</span> dashDirection;

    <span class="kw">void</span> Awake()
    {
        rb = GetComponent<<span class="type">Rigidbody2D</span>>();
        player = GetComponent<<span class="type">PlayerController</span>>();
    }

    <span class="kw">public void</span> OnDash(<span class="type">InputValue</span> value)
    {
        <span class="kw">if</span> (value.isPressed && canDash && !isDashing)
            StartCoroutine(PerformDash());
    }

    <span class="type">IEnumerator</span> PerformDash()
    {
        canDash = <span class="kw">false</span>;
        isDashing = <span class="kw">true</span>;
        dashDirection = player.FacingDirection; <span class="comment">// get from PlayerController</span>

        <span class="comment">// Brief freeze frame — feels punchy</span>
        Time.timeScale = <span class="val">0.05f</span>;
        <span class="kw">yield return new</span> WaitForSecondsRealtime(<span class="val">0.04f</span>);
        Time.timeScale = <span class="val">1f</span>;

        rb.gravityScale = <span class="val">0f</span>;   <span class="comment">// ignore gravity during dash</span>
        rb.velocity = <span class="kw">new</span> <span class="type">Vector2</span>(dashDirection * dashSpeed, <span class="val">0f</span>);
        <span class="kw">if</span> (dashTrail) dashTrail.emitting = <span class="kw">true</span>;

        <span class="kw">yield return new</span> WaitForSeconds(dashDuration);

        rb.gravityScale = <span class="val">3f</span>;  <span class="comment">// restore gravity</span>
        rb.velocity = <span class="type">Vector2</span>.zero;
        isDashing = <span class="kw">false</span>;
        <span class="kw">if</span> (dashTrail) dashTrail.emitting = <span class="kw">false</span>;

        <span class="kw">yield return new</span> WaitForSeconds(dashCooldown);
        canDash = <span class="kw">true</span>;
    }

    <span class="kw">public bool</span> IsDashing => isDashing; <span class="comment">// expose for other systems</span>
}`,
        warn:{label:"Unity gotcha",text:"Setting Time.timeScale to 0 pauses the entire game including your coroutine — use WaitForSecondsRealtime instead of WaitForSeconds for any delay inside the freeze frame. This is one of the most common beginner bugs with slow-motion effects in Unity."}
      },
      {
        name:"2.2 — Cinemachine camera setup",
        tags:[{t:"Camera",c:"#FAEEDA/#633806"},{t:"Cinemachine",c:"#E1F5EE/#085041"}],
        sections:[
          {title:"Why Cinemachine instead of scripting a camera",body:"A hand-coded follow camera takes hours to get right and still feels worse than Cinemachine's built-in damping, dead zones, and look-ahead. Cinemachine is used in professional games — configure it through the Inspector, no code needed."},
          {title:"Setup steps in Unity",body:"1. Install Cinemachine via Package Manager. 2. In your scene: Create → Cinemachine → 2D Camera. 3. Drag Amari into the Follow field. 4. Set Lookahead Time to 0.3 — camera leads slightly in the movement direction. 5. Set Dead Zone Width to 0.5 — small dead zone so minor jitter doesn't move the camera."},
        ],
        code:`<span class="comment">// CameraController.cs — add screen shake, nothing else</span>
<span class="comment">// Cinemachine handles following. This handles impulse.</span>

<span class="kw">using</span> Cinemachine;

<span class="kw">public class</span> <span class="type">CameraController</span> : MonoBehaviour
{
    <span class="kw">public static</span> <span class="type">CameraController</span> Instance;
    [SerializeField] <span class="type">CinemachineImpulseSource</span> impulseSource;

    <span class="kw">void</span> Awake() => Instance = <span class="kw">this</span>;

    <span class="comment">// Call from anywhere: CameraController.Instance.Shake(0.3f)</span>
    <span class="kw">public void</span> Shake(<span class="kw">float</span> force = <span class="val">0.3f</span>)
    {
        impulseSource.GenerateImpulse(force);
    }
}

<span class="comment">// Usage example — in PlayerCombat.cs when landing a hit:</span>
<span class="comment">// CameraController.Instance.Shake(0.2f);</span>`,
        insight:{label:"Screen shake is juice",text:"'Game juice' is the collection of micro-feedback effects that make an action feel impactful: screen shake, hit pause, particle burst, sound FX, controller rumble. Adding screen shake on every hit is the single highest-return polish addition in 2D action games. Start with it at 0.15f intensity and tune from there."}
      },
      {
        name:"2.3 — Melee combat system",
        tags:[{t:"Combat",c:"#FAECE7/#993C1D"},{t:"Hitbox",c:"#EEEDFE/#3C3489"}],
        sections:[
          {title:"The hitbox architecture",body:"Combat in professional 2D games uses Physics2D.OverlapBox or OverlapCircle rather than trigger colliders on weapons. This gives precise, frame-perfect control over when and where damage is checked. Trigger colliders on swords clip through walls and can hit enemies mid-backswing."},
        ],
        code:`<span class="comment">// PlayerCombat.cs</span>

<span class="kw">public class</span> <span class="type">PlayerCombat</span> : MonoBehaviour
{
    [Header(<span class="str">"Attack"</span>)]
    [SerializeField] <span class="type">Transform</span> attackPoint;      <span class="comment">// child object in front of player</span>
    [SerializeField] <span class="kw">float</span> attackRange = <span class="val">0.6f</span>;
    [SerializeField] <span class="kw">int</span> attackDamage = <span class="val">20</span>;
    [SerializeField] <span class="kw">float</span> attackCooldown = <span class="val">0.4f</span>;
    [SerializeField] <span class="type">LayerMask</span> enemyLayer;

    [Header(<span class="str">"Combo"</span>)]
    [SerializeField] <span class="kw">float</span> comboWindow = <span class="val">0.6f</span>;     <span class="comment">// time to chain next hit</span>
    <span class="kw">int</span> comboCount;
    <span class="kw">float</span> lastAttackTime;
    <span class="kw">bool</span> canAttack = <span class="kw">true</span>;

    <span class="kw">public void</span> OnAttack(<span class="type">InputValue</span> value)
    {
        <span class="kw">if</span> (!value.isPressed || !canAttack) <span class="kw">return</span>;

        <span class="comment">// Advance or reset combo</span>
        comboCount = (Time.time - lastAttackTime < comboWindow)
            ? Mathf.Min(comboCount + <span class="val">1</span>, <span class="val">3</span>) : <span class="val">1</span>;
        lastAttackTime = Time.time;

        StartCoroutine(AttackRoutine());
    }

    <span class="type">IEnumerator</span> AttackRoutine()
    {
        canAttack = <span class="kw">false</span>;
        <span class="kw">float</span> damageMultiplier = comboCount == <span class="val">3</span> ? <span class="val">2f</span> : <span class="val">1f</span>; <span class="comment">// combo finisher</span>

        <span class="comment">// Hit pause — freeze frame on the hit frame</span>
        Time.timeScale = <span class="val">0.05f</span>;
        <span class="kw">yield return new</span> WaitForSecondsRealtime(<span class="val">0.04f</span>);
        Time.timeScale = <span class="val">1f</span>;

        <span class="comment">// Check for enemies in attack range</span>
        <span class="type">Collider2D</span>[] hits = Physics2D.OverlapCircleAll(
            attackPoint.position, attackRange, enemyLayer);

        <span class="kw">foreach</span> (<span class="kw">var</span> hit <span class="kw">in</span> hits)
        {
            <span class="kw">if</span> (hit.TryGetComponent<<span class="type">EnemyHealth</span>>(out <span class="kw">var</span> enemy))
            {
                enemy.TakeDamage((<span class="kw">int</span>)(attackDamage * damageMultiplier));
                CameraController.Instance.Shake(<span class="val">0.2f</span>);
            }
        }

        <span class="kw">yield return new</span> WaitForSeconds(attackCooldown);
        canAttack = <span class="kw">true</span>;
    }
}`,
        warn:{label:"Hitbox visualisation",text:"Always visualise your hitboxes during development. Add OnDrawGizmosSelected() with Gizmos.DrawWireSphere(attackPoint.position, attackRange) to see exactly what the hit check covers. Players complain about 'phantom hits' or 'missed attacks' because the developer never saw what the hitbox actually covers."}
      },
      {
        name:"2.4 — First enemy AI (patrol and detect)",
        tags:[{t:"AI",c:"#FAECE7/#993C1D"},{t:"State machine",c:"#EEEDFE/#3C3489"}],
        sections:[
          {title:"The state machine pattern",body:"Every enemy needs a simple state machine: Patrol → Detect → Chase → Attack → Return. Each state has clear entry and exit conditions. Never use if/else chains for this — they grow unmanageable. Use an enum and switch statement as a minimal state machine. This pattern scales to boss AI without structural changes."},
        ],
        code:`<span class="comment">// SoldierAI.cs — colonial soldier base behaviour</span>

<span class="kw">public class</span> <span class="type">SoldierAI</span> : MonoBehaviour
{
    <span class="kw">enum</span> <span class="type">State</span> { Patrol, Chase, Attack, Return }
    <span class="type">State</span> currentState = <span class="type">State</span>.Patrol;

    [SerializeField] <span class="kw">float</span> patrolSpeed = <span class="val">2f</span>;
    [SerializeField] <span class="kw">float</span> chaseSpeed = <span class="val">4f</span>;
    [SerializeField] <span class="kw">float</span> detectionRange = <span class="val">6f</span>;
    [SerializeField] <span class="kw">float</span> attackRange = <span class="val">1.2f</span>;
    [SerializeField] <span class="type">Transform</span>[] patrolPoints;

    <span class="type">Transform</span> player;
    <span class="type">Rigidbody2D</span> rb;
    <span class="kw">int</span> currentPatrolIndex;
    <span class="type">Vector3</span> startPosition;

    <span class="kw">void</span> Awake()
    {
        rb = GetComponent<<span class="type">Rigidbody2D</span>>();
        player = <span class="type">GameObject</span>.FindGameObjectWithTag(<span class="str">"Player"</span>).transform;
        startPosition = transform.position;
    }

    <span class="kw">void</span> Update()
    {
        <span class="kw">float</span> distToPlayer = <span class="type">Vector2</span>.Distance(transform.position, player.position);

        <span class="kw">switch</span> (currentState)
        {
            <span class="kw">case</span> <span class="type">State</span>.Patrol:
                Patrol();
                <span class="kw">if</span> (distToPlayer < detectionRange) TransitionTo(<span class="type">State</span>.Chase);
                <span class="kw">break</span>;

            <span class="kw">case</span> <span class="type">State</span>.Chase:
                MoveTowards(player.position, chaseSpeed);
                <span class="kw">if</span> (distToPlayer < attackRange)  TransitionTo(<span class="type">State</span>.Attack);
                <span class="kw">if</span> (distToPlayer > detectionRange * <span class="val">1.5f</span>) TransitionTo(<span class="type">State</span>.Return);
                <span class="kw">break</span>;

            <span class="kw">case</span> <span class="type">State</span>.Attack:
                <span class="comment">// Trigger attack animation — handled in EnemyCombat.cs</span>
                <span class="kw">if</span> (distToPlayer > attackRange) TransitionTo(<span class="type">State</span>.Chase);
                <span class="kw">break</span>;

            <span class="kw">case</span> <span class="type">State</span>.Return:

let openCards = new Set();

function showPhase(idx, btn){
  document.querySelectorAll('.ph-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  openCards.clear();
  render(idx);
}

function toggleCard(id){
  if(openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  render(currentPhase);
}

let currentPhase=0;

function render(phaseIdx){
  currentPhase=phaseIdx;
  const ph=PHASES[phaseIdx];
  let html=`<div class="phase-intro" style="border-left:3px solid ${ph.color};border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0">
    <div class="pi-title" style="color:${ph.color}">${ph.label}</div>
    <div class="pi-body">${ph.intro}</div>
  </div><div class="mech-list">`;
  ph.mechs.forEach((m,i)=>{
    const id=`${phaseIdx}-${i}`;
    const open=openCards.has(id);
    const tags=m.tags.map(t=>{const[bg,col]=t.c.split('/');return `<span class="mtag" style="background:${bg};color:${col}">${t.t}</span>`;}).join('');
    let body='';
    if(m.sections) m.sections.forEach(s=>{
      body+=`<div class="sec-title">${s.title}</div><div class="sec-body">${s.body}</div>`;
    });
    if(m.code) body+=`<div class="code-block">${m.code}</div>`;
    if(m.insight) body+=`<div class="insight"><div class="insight-lbl">${m.insight.label}</div>${m.insight.text}</div>`;
    if(m.warn) body+=`<div class="warn"><div class="warn-lbl">${m.warn.label}</div>${m.warn.text}</div>`;
    if(m.good) body+=`<div class="good"><div class="good-lbl">${m.good.label}</div>${m.good.text}</div>`;
    html+=`<div class="mech-card">
      <div class="mech-head" onclick="toggleCard('${id}')">
        <div class="mech-num" style="background:${ph.numBg};color:${ph.numColor}">${phaseIdx+1}.${i+1}</div>
        <div class="mech-info">
          <div class="mech-name">${m.name}</div>
          <div class="mech-tag-row">${tags}</div>
        </div>
        <span class="chevron ${open?'open':''}">&#9654;</span>
      </div>
      <div class="mech-body ${open?'open':''}">${body}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('phase-container').innerHTML=html;
}

render(0);
