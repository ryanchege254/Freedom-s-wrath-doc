let openLevels = new Set();
let currentAct = 'all';

function filterAct(act) {
  currentAct = act;
  document.querySelectorAll('.act-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function toggleLevel(num) {
  if (openLevels.has(num)) openLevels.delete(num);
  else openLevels.add(num);
  updateProgress();
  render();
}

function updateProgress() {
  const pct = Math.round((openLevels.size / 20) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = openLevels.size + ' of 20 levels explored';
}

const actNames = { 1: 'Act I — The Awakening (Levels 1–5)', 2: 'Act II — The Gathering (Levels 6–12)', 3: 'Act III — The Siege (Levels 13–17)', 4: 'Act IV — Freedom\'s Wrath (Levels 18–20)' };

function render() {
  const filtered = currentAct === 'all' ? LEVELS : LEVELS.filter(l => l.act === currentAct);
  const byAct = {};
  filtered.forEach(l => { if (!byAct[l.act]) byAct[l.act] = []; byAct[l.act].push(l); });

  let html = '';
  Object.keys(byAct).sort().forEach(act => {
    html += `<div class="act-section">`;
    if (currentAct === 'all') html += `<div class="act-label">${actNames[act]}</div>`;
    byAct[act].forEach(l => {
      const isOpen = openLevels.has(l.num);
      const tagsHtml = l.tagLabels.map(t => `<span class="tag ${t.c}">${t.t}</span>`).join('');
      html += `
        <div class="level-card">
          <div class="level-header" onclick="toggleLevel(${l.num})">
            <div class="level-num" style="background:${l.color};color:${l.textColor};font-size:11px;">${l.num}</div>
            <div class="level-title-wrap">
              <div class="level-name">${l.name}</div>
              <div class="level-location">${l.location}</div>
            </div>
            <div class="level-tags">${tagsHtml}</div>
            <div class="expand-icon"><span class="chevron ${isOpen ? 'open' : ''}">&#9654;</span></div>
          </div>
          <div class="level-body ${isOpen ? 'open' : ''}">
            <div class="divider"></div>
            <div class="section-block">
              <div class="section-label">Folklore & History</div>
              <div class="section-text">${l.folklore}</div>
            </div>
            <div class="section-block">
              <div class="section-label">Story Beat</div>
              <div class="section-text">${l.story}</div>
            </div>
            <div class="section-block">
              <div class="section-label">Unique Mechanic</div>
              <div class="section-text">${l.mechanic}</div>
            </div>
            <div class="section-block">
              <div class="section-label">Design Principle</div>
              <div class="section-text">${l.design}</div>
            </div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('levels-container').innerHTML = html;
}

render();
</script>
